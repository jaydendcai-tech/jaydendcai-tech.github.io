    ctx.beginPath();ctx.ellipse(6,-6,7,4,0.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Stinger
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(-11,-1);ctx.lineTo(-11,1);ctx.fill();
    // Eyes
    ctx.fillStyle='#1c1917';ctx.beginPath();ctx.arc(5,-1,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5.5,-1.5,0.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Honey trail
    ctx.strokeStyle='rgba(251,191,36,0.2)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx,by);
    ctx.lineTo(bx-Math.sin(t*0.3+i*2.1)*10,by-Math.cos(t*0.38+i*1.9)*10);ctx.stroke();
  }
}

// ══ LOLLIPOP STAR FORGE ══════════════════════════════════════════
function drawStarZone(ctx,x,y,w,h,count,t){
  // Deep candy cosmos
  ctx.fillStyle='#0f0520';ctx.fillRect(x,y+24,w,h-24);
  for(let s=0;s<35;s++){
    const sx2=x+(s*137%w),sy2=y+24+(s*89%(h-24));
    const sz=0.3+0.6*Math.sin(t*0.1+s);
    ctx.fillStyle=['#ff9eff','#ffd93d','#a78bfa','#7dd3fc','#fff'][s%5];
    ctx.globalAlpha=sz*0.8;ctx.beginPath();ctx.arc(sx2,sy2,1.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  // Stars (giant lollipop stars)
  const n=Math.min(count,3);
  for(let i=0;i<n;i++){
    const sfx=x+w*(0.22+i*(0.5/Math.max(n-1,1)));
    const sfy=y+h*0.5;
    const sr=Math.min(w/(n+1),h*0.28)*0.55;
    const hue=(t*2+i*120)%360;
    // outer glow
    for(let gr=sr*2.8;gr>sr;gr-=6){
      const ga=0.04*(sr*2.8-gr)/(sr*1.8);
      ctx.fillStyle=`hsla(${hue},90%,75%,${ga})`;
      ctx.beginPath();ctx.arc(sfx,sfy,gr,0,Math.PI*2);ctx.fill();
    }
    // Star body - massive lollipop!
    const starGr=ctx.createRadialGradient(sfx-sr*0.3,sfy-sr*0.3,0,sfx,sfy,sr);
    starGr.addColorStop(0,'#fff');
    starGr.addColorStop(0.2,`hsl(${hue},90%,85%)`);
    starGr.addColorStop(0.6,`hsl(${hue},80%,65%)`);
    starGr.addColorStop(1,`hsl(${(hue+60)%360},90%,55%)`);
    ctx.fillStyle=starGr;ctx.beginPath();ctx.arc(sfx,sfy,sr,0,Math.PI*2);ctx.fill();
    // Candy swirl lines
    for(let sw=0;sw<3;sw++){
      ctx.strokeStyle=`hsla(${(hue+sw*60)%360},90%,95%,0.35)`;ctx.lineWidth=sr*0.1;ctx.lineCap='round';
      ctx.beginPath();
      const a0=t*0.05+sw*(Math.PI*2/3);
      ctx.arc(sfx,sfy,sr*0.55,a0,a0+Math.PI*0.8);ctx.stroke();
    }
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath();ctx.ellipse(sfx-sr*0.35,sfy-sr*0.35,sr*0.22,sr*0.15,Math.PI/4,0,Math.PI*2);ctx.fill();

    // Solar flares - candy coloured
    for(let f=0;f<7;f++){
      const fa=t*0.18+f*Math.PI*2/7;
      const fl=sr*(0.9+0.5*Math.sin(t*0.55+f));
      ctx.strokeStyle=`hsl(${(hue+f*20)%360},90%,75%)`+Math.floor(0.55*255).toString(16);ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(sfx+Math.cos(fa)*sr,sfy+Math.sin(fa)*sr);
      ctx.lineTo(sfx+Math.cos(fa)*(sr+fl),sfy+Math.sin(fa)*(sr+fl));ctx.stroke();
    }
    // Orbiting lollipops
    const la=t*0.12*(1+i*0.3)+i*2;
    const lox=sfx+Math.cos(la)*(sr+38);
    const loy=sfy+Math.sin(la)*(sr+38)*0.6;
    ctx.save();ctx.translate(lox,loy);ctx.rotate(la);
    const lc=`hsl(${(hue+180)%360},90%,65%)`;
    ctx.fillStyle=lc;ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(-2,-2,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(-1,7,2,10);ctx.restore();
    if(Math.random()<0.07) spawnParticle(sfx+(Math.random()-0.5)*sr*2,sfy+(Math.random()-0.5)*sr*2,'sugar');
  }
}

// ══ SUGARCORP MEGAPLANT ══════════════════════════════════════════
function drawAdvertZone(ctx,x,y,w,h,count,t){
  // Fully automated — no humans anywhere. Just metal, steam, conveyors.
  const sky=ctx.createLinearGradient(x,y+24,x,y+h*0.4);
  sky.addColorStop(0,'#1a1a20');sky.addColorStop(1,'#2a2a35');
  ctx.fillStyle=sky;ctx.fillRect(x,y+24,w,h*0.4);
  ctx.fillStyle='#111118';ctx.fillRect(x,y+h*0.6,w,h*0.4);

  // Massive factory structure wall-to-wall
  const fg=ctx.createLinearGradient(x,y+h*0.3,x,y+h*0.6);
  fg.addColorStop(0,'#2a2a35');fg.addColorStop(1,'#1a1a22');
  ctx.fillStyle=fg;ctx.fillRect(x,y+h*0.3,w,h*0.35);

  // Conveyor belts — moving, glowing faintly pink (last trace of candy)
  const beltY=[y+h*0.48,y+h*0.56];
  beltY.forEach((by,bi)=>{
    ctx.fillStyle='#333340';ctx.fillRect(x,by,w,10);
    const boff=(t*40*(bi===0?1:-1))%30;
    ctx.fillStyle='rgba(232,68,154,0.2)';
    for(let b=-1;b<w/30+1;b++) ctx.fillRect(x+b*30+boff,by+2,20,6);
    // candy blobs on belt
    for(let c=0;c<Math.min(count,8);c++){
      const cx2=x+((c*87+t*40*(bi===0?1:-1))%w);
      ctx.fillStyle=`hsl(${(c*40+t*5)%360},60%,40%)`;
      ctx.beginPath();ctx.arc(cx2,by+5,4,0,Math.PI*2);ctx.fill();
    }
  });

  // Robot arms — articulated, precise
  const na=Math.min(count,6);
  for(let i=0;i<na;i++){
    const ax=x+w*(0.08+i*(0.84/Math.max(na-1,1)));
    const ay=y+h*0.38;
    const a1=Math.sin(t*0.6+i*1.1)*0.4;
    const a2=Math.sin(t*0.5+i*0.9+1)*0.5;
    // base
    ctx.fillStyle='#3a3a48';ctx.fillRect(ax-5,ay,10,12);
    // arm segment 1
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a1);
    ctx.fillStyle='#4a4a58';ctx.fillRect(-3,-22,6,22);
    ctx.translate(0,-22);ctx.rotate(a2);
    // arm segment 2
    ctx.fillStyle='#5a5a68';ctx.fillRect(-2,-16,5,16);
    // claw / tool
    ctx.fillStyle='#888898';ctx.fillRect(-4,-20,3,5);ctx.fillRect(2,-20,3,5);
    ctx.restore();
  }

  // Vent stacks — many, all smoking
  const nv=Math.min(count+2,8);
  for(let i=0;i<nv;i++){
    const vx=x+w*(0.06+i*(0.88/Math.max(nv-1,1)));
    ctx.fillStyle='#222230';ctx.fillRect(vx-3,y+h*0.28,6,h*0.07);
    if(Math.random()<0.07) spawnParticle(vx,y+h*0.28,'steam');
  }

  // Output counter display
  ctx.fillStyle='rgba(0,255,100,0.12)';ctx.fillRect(x+w*0.35,y+h*0.32,w*0.3,h*0.1);
  ctx.font=`bold ${Math.min(10,w/14)}px monospace`;ctx.textAlign='center';
  ctx.fillStyle='rgba(0,255,100,0.7)';
  ctx.fillText('OUTPUT: '+fmt(G.cps)+'/s',x+w*0.5,y+h*0.385);
}

// ══ EXTRACTION COLONY ════════════════════════════════════════════
function drawSweatZone(ctx,x,y,w,h,count,t){
  // Open-pit strip mine — entire landscape gouged out
  const sky=ctx.createLinearGradient(x,y+24,x,y+h*0.35);
  sky.addColorStop(0,'#4a3a20');sky.addColorStop(1,'#6a5030');
  ctx.fillStyle=sky;ctx.fillRect(x,y+24,w,h*0.35);
  // Dust cloud on horizon
  ctx.fillStyle='rgba(150,110,60,0.35)';ctx.fillRect(x,y+h*0.28,w,h*0.12);

  // Pit — terraced, descending
  const tiers=Math.min(count+2,6);
  for(let i=0;i<tiers;i++){
    const depth=i/tiers;
    const tierY=y+h*(0.38+depth*0.5);
    const tierW=w*(1-depth*0.15);
    const tierX=x+w*depth*0.075;
    const col=`hsl(25,${35-depth*10}%,${28-depth*8}%)`;
    ctx.fillStyle=col;ctx.fillRect(tierX,tierY,tierW,h*0.55);
    // tier edge highlight
    ctx.strokeStyle=`rgba(180,130,60,${0.3-depth*0.04})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(tierX,tierY);ctx.lineTo(tierX+tierW,tierY);ctx.stroke();
    // raw sugar ore veins — pale crystalline streaks
    ctx.strokeStyle=`rgba(255,220,180,${0.25-depth*0.03})`;ctx.lineWidth=1;
    for(let v=0;v<4;v++){
      ctx.beginPath();ctx.moveTo(tierX+tierW*(0.1+v*0.22),tierY);
      ctx.lineTo(tierX+tierW*(0.15+v*0.22),tierY+h*0.08);ctx.stroke();
    }
  }

  // Mining vehicles — tiny at bottom of pit
  const nv=Math.min(count,5);
  for(let i=0;i<nv;i++){
    const vx=x+w*(0.1+i*(0.8/Math.max(nv-1,1)))+Math.sin(t*0.1+i)*3;
    const vy=y+h*0.75;
    ctx.fillStyle='#5a4a30';ctx.fillRect(vx-8,vy-5,16,8);
    ctx.fillStyle='#3a2a18';ctx.beginPath();ctx.arc(vx-5,vy+3,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(vx+5,vy+3,3,0,Math.PI*2);ctx.fill();
    // scoop raised
    ctx.strokeStyle='#6a5a38';ctx.lineWidth=2;
    const scoopA=Math.sin(t*0.4+i)*0.3-0.5;
    ctx.save();ctx.translate(vx+8,vy-3);ctx.rotate(scoopA);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(10,0);ctx.stroke();
    ctx.restore();
    if(Math.random()<0.04) spawnParticle(vx,vy-8,'steam');
  }

  // Ore processing drum on surface
  ctx.fillStyle='#4a3a20';ctx.fillRect(x+w*0.05,y+h*0.36,w*0.12,h*0.08);
  ctx.save();ctx.translate(x+w*0.11,y+h*0.4);ctx.rotate(t*0.5);
  ctx.strokeStyle='#8a7040';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,h*0.03,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// ══ CONTINENTAL PIPELINE ═════════════════════════════════════════
function drawPipeZone(ctx,x,y,w,h,count,t){
  // Landscape completely covered in pipes — nothing else visible
  ctx.fillStyle='#1a1510';ctx.fillRect(x,y+24,w,h-24);

  // Background pipes — small, receding to horizon
  for(let layer=4;layer>0;layer--){
    const ly=y+h*(0.25+layer*0.12);
    const lh=3+layer*2;
    const col=`hsl(25,${20+layer*5}%,${12+layer*4}%)`;
    ctx.fillStyle=col;ctx.fillRect(x,ly,w,lh);
    ctx.fillStyle=`rgba(255,180,60,${0.05+layer*0.03})`;
    const foff=(t*15*(layer%2===0?1:-1))%30;
    for(let f=-1;f<w/30+1;f++) ctx.fillRect(x+f*30+foff,ly+1,12,lh-2);
  }

  // Foreground mega-pipes — 3 massive ones dominating the scene
  const pipes=[
    {y:0.38,h:22,col1:'#8a6a30',col2:'#c4a050',col3:'#5a3a10'},
    {y:0.54,h:30,col1:'#6a5020',col2:'#a07830',col3:'#4a2a08'},
    {y:0.72,h:18,col1:'#7a5828',col2:'#b08838',col3:'#503010'},
  ];
  pipes.forEach((p,pi)=>{
    const py=y+h*p.y;
    const pg=ctx.createLinearGradient(0,py,0,py+p.h);
    pg.addColorStop(0,p.col2);pg.addColorStop(0.4,p.col1);pg.addColorStop(1,p.col3);
    ctx.fillStyle=pg;ctx.fillRect(x,py,w,p.h);
    // segment joints
    for(let b=0;b<Math.floor(w/50)+1;b++){
      ctx.fillStyle=p.col3;ctx.fillRect(x+b*50,py-3,5,p.h+6);
    }
    // flow visible through scratched surface
    const foff=(t*20*(pi%2===0?1:-1))%50;
    ctx.globalAlpha=0.15;ctx.fillStyle=p.col2;
    for(let f=-1;f<w/50+1;f++) ctx.fillRect(x+f*50+foff,py+4,25,p.h-8);
    ctx.globalAlpha=1;
    // pressure gauge
    const gx=x+w*0.5,gy=py-8;
    ctx.fillStyle='#2a2010';ctx.fillRect(gx-8,gy-8,16,16);
    ctx.strokeStyle='#6a5020';ctx.lineWidth=1;ctx.strokeRect(gx-8,gy-8,16,16);
    const needle=Math.sin(t*0.3+pi)*0.8;
    ctx.save();ctx.translate(gx,gy);ctx.rotate(needle);
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-5);ctx.stroke();
    ctx.restore();
  });

  // Valve wheels — scattered across scene
  for(let v=0;v<Math.min(count,6);v++){
    const vx=x+w*(0.08+v*(0.84/Math.max(count-1,1))),vy=y+h*0.48;
    ctx.save();ctx.translate(vx,vy);ctx.rotate(t*0.1*(v%2===0?1:-1));
    ctx.strokeStyle='#8a7040';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.stroke();
    for(let sp=0;sp<4;sp++){const sa=sp*Math.PI/2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sa)*8,Math.sin(sa)*8);ctx.stroke();}
    ctx.restore();
  }
}

// ══ HARVEST DRONE FLEET ══════════════════════════════════════════
function drawDroneZone(ctx,x,y,w,h,count,t){
  // Farmland below — but harvested to bare soil, nothing left
  ctx.fillStyle='#0a0a12';ctx.fillRect(x,y+24,w,h-24);
  ctx.fillStyle='#2a1a08';ctx.fillRect(x,y+h*0.72,w,h*0.28);
  // Stubble rows — harvested cane, just stumps
  ctx.strokeStyle='#3a2a10';ctx.lineWidth=1;
  for(let r=0;r<w;r+=8){
    ctx.beginPath();ctx.moveTo(x+r,y+h*0.72);ctx.lineTo(x+r,y+h*0.76);ctx.stroke();
  }

  // Harvest beams sweeping the ground — amber, not red (this is work, not enforcement... mostly)
  for(let rb=0;rb<3;rb++){
    const rx=x+w*(0.2+rb*0.3),ry=y+h*0.35;
    const ra=Math.sin(t*0.35+rb*2.1)*0.9;
    ctx.save();ctx.translate(rx,ry);ctx.rotate(ra);
    const bg=ctx.createLinearGradient(0,0,0,h*0.4);
    bg.addColorStop(0,'rgba(180,120,20,0.25)');bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,h*0.4,-0.18,0.18);ctx.fill();
    ctx.restore();
  }

  // Drones — bigger than enforcement swarm, cargo pods underneath
  const n=Math.min(count,10);
  for(let i=0;i<n;i++){
    const dt=t+i*0.65;
    const dx=x+w*0.1+Math.sin(dt*0.22+i*1.1)*(w*0.38)+Math.cos(dt*0.17+i*0.9)*(w*0.1);
    const dy=y+h*0.28+Math.cos(dt*0.28+i*1.3)*(h*0.18);
    ctx.save();ctx.translate(dx,dy);
    // body — wider, more industrial
    ctx.fillStyle='#2a3020';ctx.beginPath();
    ctx.moveTo(14,0);for(let p=1;p<6;p++){const pa=p*Math.PI/3;ctx.lineTo(Math.cos(pa)*14,Math.sin(pa)*9);}
    ctx.closePath();ctx.fill();
    // 4 arms with rotors
    [-1,1].forEach(s=>{
      [-1,1].forEach(s2=>{
        ctx.strokeStyle='#4a5040';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(s*16,s2*10);ctx.stroke();
        ctx.save();ctx.translate(s*16,s2*10);ctx.rotate(t*6*s);
        ctx.strokeStyle='rgba(120,140,100,0.5)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(7,0);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(0,7);ctx.stroke();
        ctx.restore();
      });
    });
    // cargo pod underneath — carrying harvested sugar
    ctx.fillStyle='#3a4030';ctx.fillRect(-6,5,12,8);
    ctx.fillStyle='rgba(255,200,80,0.3)';ctx.fillRect(-5,6,10,3);
    // amber harvest light — not red, subtly different
    const ep=0.4+0.4*Math.sin(t*1.8+i);
    ctx.fillStyle=`rgba(200,140,20,${ep})`;ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Collection silos on ground
  for(let s=0;s<Math.min(count,4);s++){
    const sx=x+w*(0.1+s*(0.8/Math.max(count-1,1))),sy=y+h*0.72;
    ctx.fillStyle='#3a3020';ctx.fillRect(sx-7,sy-h*0.1,14,h*0.1);
    ctx.fillStyle='#4a4030';ctx.beginPath();ctx.ellipse(sx,sy-h*0.1,7,4,0,0,Math.PI*2);ctx.fill();
    // fill level
    const fill=0.3+0.5*((s+t*0.02)%1);
    ctx.fillStyle='rgba(200,160,60,0.4)';ctx.fillRect(sx-5,sy-h*0.1*fill,10,h*0.1*fill);
  }
}

// ══ BYPRODUCT OCEAN ══════════════════════════════════════════════
function drawSludgeZone(ctx,x,y,w,h,count,t){
  // The waste from all that production formed its own biome — vast, alien, toxic
  const sky=ctx.createLinearGradient(x,y+24,x,y+h*0.42);
  sky.addColorStop(0,'#0a1a08');sky.addColorStop(0.6,'#1a3010');sky.addColorStop(1,'#2a4018');
  ctx.fillStyle=sky;ctx.fillRect(x,y+24,w,h*0.42);

  // The ocean itself — thick, slow, luminescent
  const oy=y+h*0.42;
  for(let ox=x;ox<x+w;ox+=2){
    const wave=Math.sin(ox*0.04+t*0.3)*4+Math.sin(ox*0.08+t*0.2)*2;
    const og=ctx.createLinearGradient(0,oy+wave,0,oy+h*0.6);
    og.addColorStop(0,'#2a5018');og.addColorStop(0.4,'#1a3a10');og.addColorStop(1,'#0a1a08');
    ctx.fillStyle=og;ctx.fillRect(ox,oy+wave,2,h*0.6-wave);
  }

  // Bioluminescent glow on surface
  const gg=ctx.createLinearGradient(x,oy-10,x,oy+10);
  gg.addColorStop(0,'transparent');gg.addColorStop(0.5,'rgba(80,200,40,0.25)');gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.fillRect(x,oy-10,w,20);

  // Mutant structures rising from the ocean — crystallised byproduct
  const ns=Math.min(count,7);
  for(let i=0;i<ns;i++){
    const sx=x+w*(0.06+i*(0.88/Math.max(ns-1,1)));
    const sh=h*(0.08+Math.sin(i*1.7)*0.06);
    const sy=oy+Math.sin(sx*0.04+t*0.3)*4;
    // crystal spike
    const sg=ctx.createLinearGradient(sx,sy,sx,sy-sh);
    sg.addColorStop(0,'#2a5018');sg.addColorStop(1,`hsl(${100+i*15},70%,40%)`);
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.moveTo(sx-8,sy);ctx.lineTo(sx,sy-sh);ctx.lineTo(sx+8,sy);ctx.closePath();ctx.fill();
    ctx.fillStyle=`rgba(80,220,40,0.2)`;ctx.beginPath();ctx.moveTo(sx-4,sy);ctx.lineTo(sx,sy-sh*0.6);ctx.lineTo(sx+4,sy);ctx.closePath();ctx.fill();
    // glow
    const crg=ctx.createRadialGradient(sx,sy-sh*0.5,0,sx,sy-sh*0.5,20);
    crg.addColorStop(0,`rgba(80,200,40,${0.15+0.1*Math.sin(t*0.8+i)})`);crg.addColorStop(1,'transparent');
    ctx.fillStyle=crg;ctx.beginPath();ctx.arc(sx,sy-sh*0.5,20,0,Math.PI*2);ctx.fill();
  }

  // Bubbles rising — large, slow, wrong
  for(let i=0;i<Math.min(count*3,24);i++){
    const bx=x+((i*67+t*4)%w);
    const phase=(t*0.25+i*0.7)%4;
    if(phase<3){
      const br=2+phase*2;
      ctx.strokeStyle=`rgba(80,200,40,${0.4*(1-phase/3)})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(bx,oy+5,br,0,Math.PI*2);ctx.stroke();
    }
  }

  // Abandoned processing equipment half-submerged
  for(let e=0;e<Math.min(count,3);e++){
    const ex=x+w*(0.15+e*0.35),ey=oy+Math.sin(ex*0.04+t*0.3)*4;
    ctx.fillStyle='#2a3020';ctx.fillRect(ex-12,ey-8,24,12);
    ctx.fillStyle='#1a2018';ctx.fillRect(ex-4,ey-18,8,12);
    ctx.strokeStyle='rgba(80,200,40,0.3)';ctx.lineWidth=1;ctx.strokeRect(ex-12,ey-8,24,12);
  }

  // Atmospheric green mist
  for(let m=0;m<5;m++){
    const mx=x+((m*w*0.22+t*8)%w);
    ctx.fillStyle=`rgba(40,120,20,0.06)`;ctx.beginPath();ctx.arc(mx,oy-20+m*5,35+m*8,0,Math.PI*2);ctx.fill();
  }
}

// ══ CANDY GULAG ══════════════════════════════════════════════════
function drawPrisonZone(ctx,x,y,w,h,count,t){
  ctx.fillStyle='#111827';ctx.fillRect(x,y+24,w,h-24);
  const fl=ctx.createLinearGradient(x,0,x+w*0.28,0);
  fl.addColorStop(0,'rgba(0,0,0,0.7)');fl.addColorStop(1,'transparent');
  ctx.fillStyle=fl;ctx.fillRect(x,y+24,w*0.28,h-24);
  const fr=ctx.createLinearGradient(x+w*0.72,0,x+w,0);
  fr.addColorStop(0,'transparent');fr.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=fr;ctx.fillRect(x+w*0.72,y+24,w*0.28,h-24);
  ctx.fillStyle='#374151';ctx.fillRect(x,y+h*0.32,w,h*0.68);
  ctx.strokeStyle='#1f2937';ctx.lineWidth=1;
  for(let r=0;r<5;r++) for(let c=0;c<8;c++){
    ctx.strokeRect(x+c*(w*0.125)+(r%2===0?0:w*0.0625),y+h*0.32+r*(h*0.136),w*0.125,h*0.136);
  }
  for(let gt=0;gt<2;gt++){
    const gtx=x+w*(0.12+gt*0.76);
    ctx.fillStyle='#4b5563';ctx.fillRect(gtx-13,y+h*0.14,26,h*0.22);
    ctx.fillStyle='#374151';ctx.fillRect(gtx-17,y+h*0.12,34,7);
    const la=Math.sin(t*0.32+gt*Math.PI)*0.85;
    ctx.save();ctx.translate(gtx,y+h*0.16);ctx.rotate(la);
    const lg=ctx.createRadialGradient(0,0,0,0,0,65);
    lg.addColorStop(0,'rgba(255,255,200,0.55)');lg.addColorStop(0.3,'rgba(255,255,200,0.12)');lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,65,-0.22,0.22);ctx.fill();
    ctx.restore();
    ctx.fillStyle='rgba(255,255,200,0.9)';ctx.beginPath();ctx.arc(gtx,y+h*0.16,3.5,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='#6b7280';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y+h*0.31);ctx.lineTo(x+w,y+h*0.31);ctx.stroke();
  for(let bw=0;bw<w;bw+=12){
    ctx.beginPath();ctx.moveTo(x+bw,y+h*0.29);ctx.lineTo(x+bw+4,y+h*0.33);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+bw+6,y+h*0.29);ctx.lineTo(x+bw+2,y+h*0.33);ctx.stroke();
  }
  const n=Math.min(count,7);
  for(let i=0;i<n;i++){
    const px=x+w*(0.1+i*(0.8/Math.max(n-1,1))),py=y+h*0.6;
    const sh=Math.sin(t*0.45+i)*1.1;
    ctx.fillStyle='#4b5563';ctx.fillRect(px-5,py+sh,10,14);
    ctx.fillStyle='#374151';ctx.fillRect(px-5,py+4+sh,10,2);ctx.fillRect(px-5,py+10+sh,10,2);
    ctx.fillStyle='#c4b5fd';ctx.beginPath();ctx.arc(px,py-4+sh,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(px-2,py-5+sh,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+2,py-5+sh,1.2,0,Math.PI*2);ctx.fill();
    if(i<n-1){ctx.strokeStyle='#6b7280';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+5,py+11+sh);ctx.lineTo(px+w*(0.8/Math.max(n-1,1))-5,py+11+sh);ctx.stroke();}
    ctx.font='5px monospace';ctx.fillStyle='#9ca3af';ctx.textAlign='center';ctx.fillText('#'+(1000+i),px,py+8+sh);
  }
}

// ══ THE SUGAR GOD ════════════════════════════════════════════════
function drawGodZone(ctx,x,y,w,h,count,t){
  ctx.fillStyle='#000';ctx.fillRect(x,y+24,w,h-24);
  for(let s=0;s<35;s++){
    const ang=(s*2.4+t*0.025)%(Math.PI*2);
    const dist=((s*37+t*1.5)%(Math.min(w,h)*0.42))+8;
    const sx2=x+w*0.5+Math.cos(ang)*dist;
    const sy2=y+h*0.5+Math.sin(ang)*dist*0.72;
    const sz=0.5+1.2*(1-(dist/(Math.min(w,h)*0.42)));
    ctx.fillStyle=`hsl(${(s*17+t*10)%360},55%,${35+30*sz}%)`;
    ctx.globalAlpha=sz*0.65;ctx.beginPath();ctx.arc(sx2,sy2,sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  const cx=x+w*0.5,cy=y+h*0.5;
  for(let ring=10;ring>0;ring--){
    const rr=(ring/10)*Math.min(w,h)*0.38;
    const hue=(t*18+ring*22)%360;
    ctx.strokeStyle=ring%2===0?`hsla(${hue},80%,60%,${ring/10*0.35})`:`rgba(0,0,0,${ring/10*0.7})`;
    ctx.lineWidth=2.5+ring*0.4;
    ctx.beginPath();ctx.ellipse(cx,cy,rr,rr*0.78,t*0.03*(ring%2===0?1:-1),0,Math.PI*2);ctx.stroke();
  }
  const er=Math.min(w,h)*0.13;
  const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,er);
  ig.addColorStop(0,'#ff6b9d');ig.addColorStop(0.3,`hsl(${(t*22)%360},90%,50%)`);
  ig.addColorStop(0.7,'#4a0072');ig.addColorStop(1,'#000');
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(cx,cy,er,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(cx,cy,er*0.14,er*0.68,0,0,Math.PI*2);ctx.fill();
  const pg=ctx.createRadialGradient(cx,cy,0,cx,cy,er*0.18);
  pg.addColorStop(0,'rgba(220,38,38,0.8)');pg.addColorStop(1,'transparent');
  ctx.fillStyle=pg;ctx.beginPath();ctx.arc(cx,cy,er*0.18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.ellipse(cx-er*0.24,cy-er*0.24,er*0.18,er*0.1,-0.5,0,Math.PI*2);ctx.fill();
  for(let m=0;m<8;m++){
    const ma=m*Math.PI/4+t*0.1;
    ctx.fillStyle=`hsl(${(m*45+t*15)%360},80%,65%)`;
    ctx.font='bold 9px serif';ctx.textAlign='center';
    ctx.fillText(['\uD83C\uDF6D','\u2736','\u25C6','\uD83C\uDF6C','\u2727','\u25C8','\u2B21','\u2736'][m],cx+Math.cos(ma)*(er+11),cy+Math.sin(ma)*(er+11)*0.8+3);
  }
  const tn=Math.min(count,6);
  for(let i=0;i<tn;i++){
    const ta=i*(Math.PI*2/Math.max(tn,1))+t*0.05;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(ta);
    const tlen=Math.min(w,h)*0.34;
    const tg=ctx.createLinearGradient(er,0,tlen,0);
    tg.addColorStop(0,`hsl(${(i*60+t*20)%360},80%,55%)`);tg.addColorStop(0.6,'#4a1942');tg.addColorStop(1,'transparent');
    ctx.strokeStyle=tg;ctx.lineWidth=3+2*Math.sin(t*0.55+i);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(er,0);
    for(let seg=0;seg<8;seg++){const sl=(seg+1)/8;ctx.lineTo(er+tlen*sl,Math.sin(t*0.8+i*2+seg)*7*(sl*2));}
    ctx.stroke();ctx.restore();
  }
  const msgs=['ALL CANDY IS MINE','CONSUME. WORSHIP. REPEAT.','IT SEES YOUR CRAVINGS'];
  ctx.font=`bold ${Math.min(9,w/15)}px monospace`;ctx.textAlign='center';
  ctx.fillStyle=`rgba(220,38,38,${0.3+0.25*Math.sin(t*0.7)})`;
  ctx.fillText(msgs[Math.floor(t*0.2)%3],cx,y+h*0.91);
}

// ─── RENDER UI ────────────────────────────────────────────────────
function renderUnits(){
  const c=document.getElementById('unitsList');c.innerHTML='';
  UNITS.forEach((unit,i)=>{
    const cost=unitCost(unit);
    const locked=G.cans<cost&&G.units[unit.id]===0&&G.total<cost*0.3;
    const afford=G.cans>=cost;
    const d=document.createElement('div');
    d.className=`ucard${locked?' locked':''}${afford?' afford':''}`;
    d.innerHTML=`<div class="uicon">${unit.icon}</div><div class="uinfo"><div class="uname">${unit.name}</div><div class="ucost">🍭 ${fmt(cost)}</div><div class="udps">${(unit.baseCps*G.um[unit.id]).toFixed(2)}/s · +${fmt(UNIT_CLICK_BONUS[i])} click</div></div><div class="ucount">${G.units[unit.id]}</div>`;
    if(!locked)d.onclick=()=>buyUnit(unit);
    c.appendChild(d);
  });
}

function renderUpgrades(){
  const c=document.getElementById('upgradesList');c.innerHTML='';
  UPGRADES.forEach(upg=>{
    const bought=G.bought.has(upg.id);
    const unlocked=G.total>=upg.cost*0.25||bought;
    const afford=G.cans>=upg.cost;
    const d=document.createElement('div');
    d.className=`upcard${!unlocked?' locked':''}${bought?' bought':''}${afford&&!bought?' afford':''}`;
    d.innerHTML=`<div class="upicon">${upg.icon}</div><div class="upinfo"><div class="upname">${upg.name}</div><div class="upcost">${bought?'✓ Applied':'🍭 '+fmt(upg.cost)}</div><div class="updesc">${upg.desc}</div></div>`;
    if(!bought&&unlocked)d.onclick=()=>buyUpgrade(upg);
    c.appendChild(d);
  });
}

function renderStats(){
  const tb=UNITS.reduce((s,u)=>s+G.units[u.id],0);
  document.getElementById('statTotal').textContent=fmt(G.total);
  document.getElementById('statCps').textContent=G.cps.toFixed(2)+'/s';
  document.getElementById('statCpc').textContent=fmt(G.cm)+'/click';
  document.getElementById('statBuildings').textContent=tb;
  document.getElementById('statUpg').textContent=G.upgCount;
  document.getElementById('hdrCount').textContent=fmt(G.cans)+' 🍭';
  document.getElementById('hdrCps').textContent=G.cps.toFixed(2)+'/sec';
  document.getElementById('canCount').textContent=fmt(G.cans)+' 🍭';
  document.getElementById('canCps').textContent=G.cps.toFixed(2)+' candies/sec · click to produce!';
  let mi=G.nextM;
  while(mi<MILESTONES.length&&G.total>=MILESTONES[mi]){addLog(`🎉 ${fmt(MILESTONES[mi])} candies produced!`);mi++;}
  G.nextM=mi;
  const nextM=MILESTONES[mi]||MILESTONES[MILESTONES.length-1]*10;
  const prevM=mi>0?MILESTONES[mi-1]:0;
  document.getElementById('mbar').style.width=(Math.min(1,(G.total-prevM)/(nextM-prevM))*100)+'%';
  document.getElementById('mlabel').textContent=`Next: ${fmt(nextM)} candies`;
}
function renderAll(){renderUnits();renderUpgrades();renderStats();}

// CLICK
document.getElementById('mainBtn').addEventListener('click',e=>{
  const gain=G.cm;G.cans+=gain;G.total+=gain;
  const row=document.getElementById('canRow');
  const p=document.createElement('div');
  p.className='click-part';p.textContent='+'+fmt(gain)+' 🍭';
  p.style.cssText=`left:${e.offsetX}px;top:${e.offsetY}px;`;

});

// ─── SAVE / LOAD ──────────────────────────────────────────────────
// Unit short codes — explicit to avoid collisions
const UNIT_CODES=['cg','scm','cf','scf','fl','cgal','gb','sc','cv','sr','mp','st','cd','bsh','ls','sm','ec','cp','hdf','bo','cgul','tsg'];

function fmtSave(n){
  if(n>=1e12)return Math.round(n/1e9)+'B';
  if(n>=1e9) return Math.round(n/1e6)+'M';
  if(n>=1e6) return Math.round(n/1e3)+'K';
  return Math.round(n)+'';
}
function parseSave(s){
  s=s.trim();
  const mult={'':1,'K':1e3,'M':1e6,'B':1e9,'T':1e12};
  const m=s.match(/^(\d+(?:\.\d+)?)(K|M|B|T)?$/i);
  if(!m)return null;
  return parseFloat(m[1])*(mult[m[2]?m[2].toUpperCase():'']);
}

function generateCode(){
  // candy count first, then only units with count>0
  const parts=[fmtSave(Math.floor(G.cans))+'c'];
  UNITS.forEach((u,i)=>{
    const n=G.units[u.id];
    if(n>0) parts.push(n+UNIT_CODES[i]);
  });
  // also encode bought upgrades as a compact bitmask at the end
  const upgIds=UPGRADES.map(u=>u.id);
  let mask=0n;
  upgIds.forEach((id,i)=>{if(G.bought.has(id))mask|=(1n<<BigInt(i));});
  if(mask>0n) parts.push('U'+mask.toString(36));
  // group into chunks of 4 separated by -
  const groups=[];
  for(let i=0;i<parts.length;i+=4) groups.push(parts.slice(i,i+4).join('.'));
  return groups.join('-');
}

function loadCode(code){
  code=code.trim().replace(/\s+/g,'');
  if(!code)return'Empty code.';
  // flatten all parts
  const parts=code.split('-').flatMap(g=>g.split('.'));
  let newCans=0,newTotal=0;
  const newUnits={};
  UNITS.forEach(u=>newUnits[u.id]=0);
  const newBought=new Set();

  for(const part of parts){
    // candy: ends with 'c' and starts with a digit
    if(/^\d[\dKMBT]*c$/i.test(part)){
      const val=parseSave(part.slice(0,-1));
      if(val===null)return'Bad candy value: '+part;
      newCans=val;newTotal=val;
      continue;
    }
    // upgrade bitmask: starts with U
    if(/^U[0-9a-z]+$/i.test(part)){
      const mask=BigInt('0x'+BigInt('0n').toString()+parseInt(part.slice(1),36).toString(16));
      // simpler: parse as base36 bigint
      const m=BigInt(parseInt(part.slice(1),36));
      UPGRADES.forEach((upg,i)=>{if(m&(1n<<BigInt(i)))newBought.add(upg.id);});
      continue;
    }
    // unit count: number followed by unit code
    const unitMatch=part.match(/^(\d+)([a-z]+)$/i);
    if(unitMatch){
      const count=parseInt(unitMatch[1]);
      const code2=unitMatch[2].toLowerCase();
      const idx=UNIT_CODES.indexOf(code2);
      if(idx===-1)return'Unknown unit code: '+code2;
      newUnits[UNITS[idx].id]=count;
      continue;
    }
    return'Unrecognised part: '+part;
  }

  // apply
  G.cans=newCans;G.total=newTotal;
  UNITS.forEach(u=>{G.units[u.id]=newUnits[u.id];G.um[u.id]=1;});
  G.bought=newBought;G.upgCount=newBought.size;G.upgMult=1;G.nextM=0;
  // reapply upgrades in order
  UPGRADES.forEach(upg=>{
    if(!G.bought.has(upg.id))return;
    if(upg.effect)upg.effect();
    if(upg.target)G.um[upg.target]*=upg.mult;
    if(upg.allMult)UNITS.forEach(u=>{G.um[u.id]*=upg.allMult;});
  });
  G.cps=calcCps();G.cm=calcClickPower();
  renderAll();
  return'ok';
}

document.getElementById('saveBtn').addEventListener('click',()=>{
  const code=generateCode();
  const el=document.getElementById('saveOut');
  el.textContent=code;el.style.display='block';
  addLog('💾 Save code generated — click it to copy!');
});
document.getElementById('saveOut').addEventListener('click',()=>{
  const code=document.getElementById('saveOut').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const el=document.getElementById('saveOut');
    const orig=el.textContent;
    el.textContent='✓ Copied!';el.style.color='var(--mint-d)';
    setTimeout(()=>{el.textContent=orig;el.style.color='var(--purple-d)';},1200);
  });
});
document.getElementById('loadBtn').addEventListener('click',()=>{
  const code=document.getElementById('loadIn').value;
  const msg=document.getElementById('loadMsg');
  const result=loadCode(code);
  if(result==='ok'){
    msg.style.color='var(--mint-d)';msg.textContent='✓ Loaded!';
    addLog('📥 Save code loaded!');
    document.getElementById('loadIn').value='';
  } else {
    msg.style.color='var(--candy)';msg.textContent='✗ '+result;
  }
  setTimeout(()=>msg.textContent='',3000);
});

// ─── GAME LOOP ────────────────────────────────────────────────────
let last=performance.now();
function gameLoop(now){
  const dt=(now-last)/1000;last=now;tick=now/1000;
  G.cans+=G.cps*dt;G.total+=G.cps*dt;
  renderStats();drawWorld();
  requestAnimationFrame(gameLoop);
}
window.addEventListener('resize',resize);
resize();renderAll();requestAnimationFrame(gameLoop);
setInterval(renderAll,1000);
</script>
