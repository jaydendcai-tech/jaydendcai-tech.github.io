<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAM HAM EMPIRE</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#12100a;--panel:#0c0a06;--surface:#1c1508;--surface2:#251d0c;
  --spam:#c8391a;--spam-l:#e84d28;--spam-d:#8a2010;
  --gold:#d4a017;--gold-l:#f0bc2a;
  --tin:#8ba0a8;--tin-l:#b8ced8;--tin-d:#4a6470;
  --text:#f0e8d0;--muted:#7a6a50;--border:rgba(200,57,26,0.18);
}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(200,57,26,0.015) 32px,rgba(200,57,26,0.015) 33px),
  repeating-linear-gradient(90deg,transparent,transparent 32px,rgba(200,57,26,0.015) 32px,rgba(200,57,26,0.015) 33px);
}
header{background:var(--panel);border-bottom:2px solid var(--spam);padding:0 16px;height:46px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--spam-l),transparent);animation:scan 4s linear infinite;}
@keyframes scan{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.logo{font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:3px;color:var(--spam-l);text-shadow:0 0 18px rgba(200,57,26,0.5);display:flex;align-items:center;gap:8px;}
.logo-badge{background:linear-gradient(135deg,var(--tin),var(--tin-d));border:1.5px solid var(--tin-l);border-radius:3px;padding:1px 7px;font-size:13px;color:var(--spam-d);font-weight:900;letter-spacing:2px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.3);}
.hdr-stats{text-align:right;}
.hdr-count{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;color:var(--gold-l);line-height:1;}
.hdr-cps{font-size:10px;color:var(--muted);letter-spacing:1px;}
.layout{display:grid;grid-template-columns:258px 1fr 262px;flex:1;overflow:hidden;}

/* LEFT */
.left-panel{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.ptitle{font-family:'Teko',sans-serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--spam);padding:8px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:5px;}
.ptitle::before{content:'▶';font-size:7px;color:var(--spam-l);}
.scroll{overflow-y:auto;flex:1;padding:5px;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--spam-d);border-radius:2px;}

.ucard{background:var(--surface);border:1px solid rgba(200,57,26,0.12);border-radius:5px;padding:7px 9px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.1s;position:relative;overflow:hidden;}
.ucard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--spam);transform:scaleY(0);transition:transform 0.1s;transform-origin:bottom;}
.ucard:hover:not(.locked)::before{transform:scaleY(1);}
.ucard:hover:not(.locked){background:var(--surface2);border-color:var(--spam);transform:translateX(2px);}
.ucard.locked{opacity:0.28;cursor:not-allowed;}
.ucard.afford{border-color:rgba(200,57,26,0.45);box-shadow:0 0 6px rgba(200,57,26,0.12);}
.uicon{font-size:22px;flex-shrink:0;filter:drop-shadow(0 0 3px rgba(200,57,26,0.35));}
.uinfo{flex:1;min-width:0;}
.uname{font-family:'Teko',sans-serif;font-size:14px;font-weight:600;color:var(--text);line-height:1;}
.ucost{font-size:9px;color:var(--gold);margin-top:1px;}
.udps{font-size:8px;color:var(--muted);}
.ucount{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--spam-l);min-width:24px;text-align:right;text-shadow:0 0 8px rgba(200,57,26,0.4);}

.upcard{background:var(--surface);border:1px solid rgba(212,160,23,0.12);border-radius:5px;padding:6px 9px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.1s;}
.upcard:hover:not(.locked):not(.bought){background:var(--surface2);border-color:var(--gold);transform:translateX(2px);}
.upcard.locked{opacity:0.22;cursor:not-allowed;}
.upcard.bought{opacity:0.38;cursor:default;}
.upcard.afford{border-color:rgba(212,160,23,0.45);box-shadow:0 0 6px rgba(212,160,23,0.1);}
.upicon{font-size:18px;flex-shrink:0;}
.upinfo{flex:1;min-width:0;}
.upname{font-family:'Teko',sans-serif;font-size:12px;font-weight:600;color:var(--gold-l);line-height:1;}
.upcost{font-size:8px;color:var(--gold);margin-top:1px;}
.updesc{font-size:8px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* CENTER */
.center{display:flex;flex-direction:column;align-items:center;background:var(--bg);overflow:hidden;position:relative;}

/* SPAM CAN CLICKER at top */
.can-row{display:flex;align-items:center;gap:14px;padding:10px 16px 6px;flex-shrink:0;width:100%;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);}
.spam-can{width:70px;height:70px;cursor:pointer;user-select:none;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(200,57,26,0.4));transition:transform 0.08s;animation:wobble 3s ease-in-out infinite;}
.spam-can:active{transform:scale(0.88)!important;animation:none;}
@keyframes wobble{0%,100%{transform:rotate(-1.5deg) scale(1);}50%{transform:rotate(1.5deg) scale(1.02);}}
.can-info{flex:1;}
.can-count{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--gold-l);line-height:1;text-shadow:0 0 12px rgba(212,160,23,0.4);}
.can-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.click-part{position:absolute;pointer-events:none;font-family:'Teko',sans-serif;font-size:18px;font-weight:700;color:var(--gold-l);text-shadow:0 0 8px var(--gold);animation:fup 0.7s ease-out forwards;z-index:200;white-space:nowrap;}
@keyframes fup{0%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}100%{opacity:0;transform:translate(-50%,-260%) scale(0.7);}}

/* WORLD CANVAS */
.world{flex:1;width:100%;overflow:hidden;position:relative;}
#worldCanvas{display:block;width:100%;height:100%;}

/* RIGHT */
.right-panel{background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.stats-block{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.srow{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;}
.slabel{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.sval{font-family:'Teko',sans-serif;font-size:15px;font-weight:600;color:var(--text);}
.sval.hot{color:var(--spam-l);text-shadow:0 0 6px rgba(200,57,26,0.4);}
.mbar-wrap{margin-top:7px;height:3px;background:rgba(200,57,26,0.08);border-radius:2px;overflow:hidden;}
.mbar-fill{height:100%;background:linear-gradient(90deg,var(--spam-d),var(--spam-l));border-radius:2px;transition:width 0.3s;}
.mlabel{font-size:8px;color:var(--muted);text-align:right;margin-top:2px;}
.log{flex:1;overflow-y:auto;padding:5px;}
.log::-webkit-scrollbar{width:3px;}
.log::-webkit-scrollbar-thumb{background:var(--spam-d);}
.lentry{font-size:9px;color:var(--muted);padding:4px 7px;border-left:2px solid var(--spam-d);margin-bottom:3px;border-radius:0 3px 3px 0;background:rgba(200,57,26,0.03);animation:lin 0.3s ease;line-height:1.4;}
@keyframes lin{from{opacity:0;transform:translateX(-5px);}to{opacity:1;transform:translateX(0);}}
.ltime{font-size:7px;color:rgba(122,106,80,0.45);display:block;margin-bottom:1px;}
.divider{height:1px;background:var(--border);}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-badge">SPAM</div>HAM EMPIRE</div>
  <div class="hdr-stats">
    <div class="hdr-count" id="hdrCount">0 🥫</div>
    <div class="hdr-cps" id="hdrCps">0.00/sec</div>
  </div>
</header>

<div class="layout">
  <!-- LEFT: units + upgrades -->
  <div class="left-panel">
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="ptitle">Production Units</div>
      <div class="scroll" id="unitsList"></div>
    </div>
    <div class="divider"></div>
    <div style="flex:0 0 42%;display:flex;flex-direction:column;overflow:hidden;">
      <div class="ptitle">Upgrades</div>
      <div class="scroll" id="upgradesList"></div>
    </div>
  </div>

  <!-- CENTER: can clicker + world canvas -->
  <div class="center" id="centerPanel">
    <div class="can-row" id="canRow">
      <div class="spam-can" id="mainBtn">
        <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6a8a92"/><stop offset="35%" stop-color="#b8cdd5"/>
              <stop offset="65%" stop-color="#d8e4e8"/><stop offset="100%" stop-color="#5a7a82"/>
            </linearGradient>
            <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#c8d8dc"/><stop offset="100%" stop-color="#7a9aa2"/>
            </linearGradient>
          </defs>
          <rect x="8" y="14" width="54" height="46" rx="5" fill="url(#cg)"/>
          <rect x="8" y="21" width="54" height="31" fill="#c8391a"/>
          <line x1="8" y1="21" x2="15" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
          <line x1="22" y1="21" x2="29" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
          <line x1="38" y1="21" x2="45" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
          <line x1="54" y1="21" x2="61" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
          <text x="35" y="40" text-anchor="middle" fill="white" font-family="Black Han Sans,sans-serif" font-size="13" letter-spacing="2">SPAM</text>
          <text x="35" y="48" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Share Tech Mono,monospace" font-size="4.5">CHOPPED PORK &amp; HAM</text>
          <rect x="6" y="9" width="58" height="8" rx="3" fill="url(#tg)"/>
          <rect x="27" y="5" width="16" height="5" rx="2" fill="#b0c8d0"/>
          <rect x="38" y="3" width="6" height="4" rx="1.5" fill="#98b8c0"/>
          <rect x="12" y="16" width="4" height="26" rx="2" fill="rgba(255,255,255,0.12)"/>
        </svg>
      </div>
      <div class="can-info">
        <div class="can-count" id="canCount">0 🥫</div>
        <div class="can-sub" id="canCps">0.00 cans/sec · click to produce</div>
      </div>
    </div>
    <div class="world">
      <canvas id="worldCanvas"></canvas>
    </div>
  </div>

  <!-- RIGHT: stats + log -->
  <div class="right-panel">
    <div class="ptitle">Command Center</div>
    <div class="stats-block">
      <div class="srow"><span class="slabel">Total SPAM</span><span class="sval hot" id="statTotal">0</span></div>
      <div class="srow"><span class="slabel">Per Second</span><span class="sval" id="statCps">0.00</span></div>
      <div class="srow"><span class="slabel">Per Click</span><span class="sval" id="statCpc">1</span></div>
      <div class="srow"><span class="slabel">Buildings</span><span class="sval" id="statBuildings">0</span></div>
      <div class="srow"><span class="slabel">Upgrades</span><span class="sval" id="statUpg">0</span></div>
      <div style="margin-top:6px">
        <div class="mlabel" id="mlabel">Next milestone: 100</div>
        <div class="mbar-wrap"><div class="mbar-fill" id="mbar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="ptitle">Transmission Log</div>
    <div class="log" id="logArea">
      <div class="lentry"><span class="ltime">00:00</span>SPAM production online. Click the can!</div>
    </div>
  </div>
</div>

<script>
// ─── GAME DATA ────────────────────────────────────────────────────
const UNITS = [
  {id:'grandma', name:'Spam Grandma',      icon:'👵', baseCost:15,       baseCps:0.1,   desc:'Hand-packs tins lovingly.'},
  {id:'mine',    name:'Ham Mine',          icon:'⛏️',  baseCost:100,      baseCps:0.5,   desc:'Excavates raw pork seams.'},
  {id:'factory', name:'Spam Factory',      icon:'🏭',  baseCost:500,      baseCps:2,     desc:'Industrial processing.'},
  {id:'farm',    name:'Pig Farm',          icon:'🐷',  baseCost:2000,     baseCps:8,     desc:'Sustainable ham sourcing.'},
  {id:'lab',     name:'Flavour Lab',       icon:'🔬',  baseCost:8000,     baseCps:25,    desc:'Chemical ham enhancement.'},
  {id:'ship',    name:'Spam Freighter',    icon:'🚢',  baseCost:30000,    baseCps:80,    desc:'Global ham distribution.'},
  {id:'silo',    name:'Ham Silo',          icon:'🛢️',  baseCost:80000,    baseCps:200,   desc:'Stores cured reserves.'},
  {id:'station', name:'Orbital Station',   icon:'🛸',  baseCost:200000,   baseCps:550,   desc:'Zero-G ham curing.'},
  {id:'volcano', name:'Volcano Smoker',    icon:'🌋',  baseCost:600000,   baseCps:1500,  desc:'Geothermal slow-cook.'},
  {id:'portal',  name:'Ham Dimension',     icon:'🌀',  baseCost:2000000,  baseCps:4000,  desc:'Interdimensional pork.'},
  {id:'hive',    name:'Nano Ham Hive',     icon:'🐝',  baseCost:8000000,  baseCps:10000, desc:'Nano-bots assemble ham.'},
  {id:'star',    name:'Spam Star Forge',   icon:'⭐',  baseCost:30000000, baseCps:30000, desc:'Stellar meat compression.'},
];

const UPGRADES = [
  {id:'u1', name:'Reinforced Tins',     icon:'🥫', cost:100,      desc:'Click power ×2', effect:()=>{G.cm*=2}},
  {id:'u2', name:'Grandma\'s Lard',     icon:'🫙', cost:500,      desc:'Grandmas ×2', target:'grandma', mult:2},
  {id:'u3', name:'Diamond Drill',       icon:'💎', cost:1000,     desc:'Mines ×2', target:'mine', mult:2},
  {id:'u4', name:'Turbo Press',         icon:'⚙️', cost:2000,     desc:'Click power ×3', effect:()=>{G.cm*=3}},
  {id:'u5', name:'Automated Lines',     icon:'🤖', cost:5000,     desc:'Factories ×2', target:'factory', mult:2},
  {id:'u6', name:'Super Breed Pigs',    icon:'🧬', cost:10000,    desc:'Farms ×2', target:'farm', mult:2},
  {id:'u7', name:'Sodium Catalyst',     icon:'⚗️', cost:25000,    desc:'Labs ×2', target:'lab', mult:2},
  {id:'u8', name:'Fleet Expansion',     icon:'⚓', cost:60000,    desc:'Freighters ×2', target:'ship', mult:2},
  {id:'u9', name:'Pressurised Vault',   icon:'🔒', cost:120000,   desc:'Silos ×2', target:'silo', mult:2},
  {id:'u10',name:'Solar Arrays',        icon:'☀️', cost:300000,   desc:'Station ×3', target:'station', mult:3},
  {id:'u11',name:'Magma Injectors',     icon:'🔥', cost:900000,   desc:'Volcano ×2', target:'volcano', mult:2},
  {id:'u12',name:'Void Harvester',      icon:'🔮', cost:3000000,  desc:'Portal ×2', target:'portal', mult:2},
  {id:'u13',name:'Hive Intelligence',   icon:'🧠', cost:10000000, desc:'Hive ×3', target:'hive', mult:3},
  {id:'u14',name:'Stellar Compression', icon:'💫', cost:40000000, desc:'Star Forge ×2', target:'star', mult:2},
  {id:'u15',name:'Ham Conglomerate',    icon:'🌐', cost:200000,   desc:'All ×1.5', allMult:1.5},
  {id:'u16',name:'Mega Clicker Fist',   icon:'👊', cost:50000,    desc:'Click power ×5', effect:()=>{G.cm*=5}},
  {id:'u17',name:'Secret Recipe',       icon:'📜', cost:800000,   desc:'All ×2', allMult:2},
];

const MILESTONES=[100,500,1000,5000,10000,50000,100000,500000,1e6,5e6,1e7,5e7,1e8];

const G={cans:0,total:0,cps:0,cm:1,units:{},um:{},bought:new Set(),upgCount:0,nextM:0};
UNITS.forEach(u=>{G.units[u.id]=0;G.um[u.id]=1;});

function unitCost(u){return Math.ceil(u.baseCost*Math.pow(1.15,G.units[u.id]));}
function calcCps(){let t=0;UNITS.forEach(u=>{t+=u.baseCps*G.units[u.id]*G.um[u.id];});return t;}
function fmt(n){if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString();}

function addLog(msg){
  const el=document.createElement('div');el.className='lentry';
  const t=new Date();
  el.innerHTML=`<span class="ltime">${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}</span>${msg}`;
  const log=document.getElementById('logArea');log.prepend(el);
  if(log.children.length>50)log.lastChild.remove();
}

function buyUnit(unit){
  const cost=unitCost(unit);if(G.cans<cost)return;
  G.cans-=cost;G.units[unit.id]++;G.cps=calcCps();
  addLog(`Deployed ${unit.name} ×${G.units[unit.id]}`);
  renderAll();
}

function buyUpgrade(upg){
  if(G.bought.has(upg.id)||G.cans<upg.cost)return;
  G.cans-=upg.cost;G.bought.add(upg.id);G.upgCount++;
  if(upg.effect)upg.effect();
  if(upg.target)G.um[upg.target]*=upg.mult;
  if(upg.allMult)UNITS.forEach(u=>{G.um[u.id]*=upg.allMult;});
  G.cps=calcCps();
  addLog(`✦ Upgrade: ${upg.name}`);renderAll();
}

// ─── CANVAS WORLD ─────────────────────────────────────────────────
const canvas=document.getElementById('worldCanvas');
const ctx=canvas.getContext('2d');
let W=0,H=0,tick=0;

function resize(){
  const r=canvas.parentElement.getBoundingClientRect();
  W=r.width;H=r.height;canvas.width=W;canvas.height=H;
}

// Each zone definition: id, label, color scheme, draw function
const ZONES=[
  {id:'grandma', label:"Grandma's Kitchen",  bg:'#1a1008', floor:'#2e1f0a'},
  {id:'mine',    label:'Ham Mine',            bg:'#0e1410', floor:'#1a2418'},
  {id:'factory', label:'Spam Factory',        bg:'#100c08', floor:'#1e1408'},
  {id:'farm',    label:'Pig Farm',            bg:'#0e160a', floor:'#182208'},
  {id:'lab',     label:'Flavour Lab',         bg:'#080e14', floor:'#0c1620'},
  {id:'ship',    label:'Spam Harbour',        bg:'#080c14', floor:'#101828'},
  {id:'silo',    label:'Ham Silo Complex',    bg:'#121008', floor:'#201c08'},
  {id:'station', label:'Orbital Platform',    bg:'#080810', floor:'#0c0c1c'},
  {id:'volcano', label:'Volcano Smoker',      bg:'#140808', floor:'#200c08'},
  {id:'portal',  label:'Ham Dimension Gate',  bg:'#100810', floor:'#1c0c1c'},
  {id:'hive',    label:'Nano Ham Hive',       bg:'#0c1008', floor:'#141808'},
  {id:'star',    label:'Star Forge',          bg:'#0a0808', floor:'#140a08'},
];

// Particle system
const particles=[];
function spawnParticle(x,y,type){
  particles.push({x,y,vx:(Math.random()-0.5)*1.5,vy:-(Math.random()*1.5+0.5),life:1,type,size:Math.random()*4+2});
}

function drawWorld(){
  ctx.clearRect(0,0,W,H);
  const activeZones=ZONES.filter(z=>G.units[z.id]>0);
  if(activeZones.length===0){
    // empty state
    ctx.fillStyle='rgba(200,57,26,0.06)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=G.muted||'#7a6a50';
    ctx.font='14px "Share Tech Mono"';
    ctx.textAlign='center';
    ctx.fillStyle='#4a3a28';
    ctx.fillText('[ BUY UNITS TO BUILD YOUR EMPIRE ]',W/2,H/2);
    return;
  }

  const cols=Math.ceil(Math.sqrt(activeZones.length));
  const rows=Math.ceil(activeZones.length/cols);
  const zW=W/cols, zH=H/rows;

  activeZones.forEach((zone,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=col*zW, y=row*zH;
    const count=G.units[zone.id];
    drawZone(ctx,zone,x,y,zW,zH,count,tick);
  });

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=0.025;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    if(p.type==='smoke'){
      ctx.fillStyle='#8a8070';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    } else if(p.type==='spark'){
      ctx.fillStyle='#f0bc2a';
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*0.5,0,Math.PI*2);ctx.fill();
    } else if(p.type==='bubble'){
      ctx.strokeStyle='#4a8aaa';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

function drawZone(ctx,zone,x,y,w,h,count,t){
  // background
  ctx.fillStyle=zone.bg;
  ctx.fillRect(x,y,w,h);

  // floor
  ctx.fillStyle=zone.floor;
  ctx.fillRect(x,y+h*0.72,w,h*0.28);

  // border
  ctx.strokeStyle='rgba(200,57,26,0.25)';
  ctx.lineWidth=1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);

  // label banner
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(x,y,w,22);
  ctx.fillStyle='#c8391a';
  ctx.font=`bold ${Math.min(11,w/12)}px "Teko"`;
  ctx.textAlign='left';
  ctx.fillText(zone.label.toUpperCase(), x+6, y+14);
  ctx.fillStyle='#f0bc2a';
  ctx.font=`${Math.min(10,w/14)}px "Share Tech Mono"`;
  ctx.textAlign='right';
  ctx.fillText('×'+count, x+w-6, y+14);

  ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();

  // zone-specific drawing
  switch(zone.id){
    case 'grandma': drawGrandmaZone(ctx,x,y,w,h,count,t); break;
    case 'mine':    drawMineZone(ctx,x,y,w,h,count,t); break;
    case 'factory': drawFactoryZone(ctx,x,y,w,h,count,t); break;
    case 'farm':    drawFarmZone(ctx,x,y,w,h,count,t); break;
    case 'lab':     drawLabZone(ctx,x,y,w,h,count,t); break;
    case 'ship':    drawShipZone(ctx,x,y,w,h,count,t); break;
    case 'silo':    drawSiloZone(ctx,x,y,w,h,count,t); break;
    case 'station': drawStationZone(ctx,x,y,w,h,count,t); break;
    case 'volcano': drawVolcanoZone(ctx,x,y,w,h,count,t); break;
    case 'portal':  drawPortalZone(ctx,x,y,w,h,count,t); break;
    case 'hive':    drawHiveZone(ctx,x,y,w,h,count,t); break;
    case 'star':    drawStarZone(ctx,x,y,w,h,count,t); break;
  }

  ctx.restore();
}

// ── GRANDMA ZONE ──────────────────────────────
function drawGrandmaZone(ctx,x,y,w,h,count,t){
  // warm kitchen window
  const wx=x+w*0.6,wy=y+26,ww=w*0.32,wh=h*0.25;
  ctx.fillStyle='#1a3050';
  ctx.fillRect(wx,wy,ww,wh);
  // window glow
  ctx.fillStyle=`rgba(255,200,100,${0.15+0.05*Math.sin(t*0.03)})`;
  ctx.fillRect(wx,wy,ww,wh);
  ctx.strokeStyle='#6a4a20';ctx.lineWidth=2;ctx.strokeRect(wx,wy,ww,wh);
  // crossbars
  ctx.beginPath();ctx.moveTo(wx+ww/2,wy);ctx.lineTo(wx+ww/2,wy+wh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wx,wy+wh/2);ctx.lineTo(wx+ww,wy+wh/2);ctx.stroke();

  // table
  const ty=y+h*0.65;
  ctx.fillStyle='#4a2e10';ctx.fillRect(x+w*0.05,ty,w*0.7,8);
  ctx.fillStyle='#3a2408';ctx.fillRect(x+w*0.08,ty+8,10,h*0.2);ctx.fillRect(x+w*0.55,ty+8,10,h*0.2);

  const n=Math.min(count,8);
  for(let i=0;i<n;i++){
    const gx=x+w*0.1+i*(w*0.08);
    const gy=ty-30;
    // grandma body
    ctx.fillStyle='#7a3a20';ctx.beginPath();ctx.ellipse(gx,gy+18,9,14,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.fillStyle='#d4a878';ctx.beginPath();ctx.arc(gx,gy,9,0,Math.PI*2);ctx.fill();
    // hair
    ctx.fillStyle='#e0e0d0';ctx.beginPath();ctx.arc(gx,gy-3,8,Math.PI,Math.PI*2);ctx.fill();
    // arm animation - stirring
    const arm=Math.sin(t*0.08+i)*0.4;
    ctx.strokeStyle='#7a3a20';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(gx+5,gy+10);ctx.lineTo(gx+10+arm*5,gy+22);ctx.stroke();
    // can on table
    ctx.fillStyle='#c8391a';ctx.fillRect(gx-4,ty-8,8,12);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(gx-4,ty-8,3,12);
  }

  // steam from cans
  if(Math.random()<0.04){
    spawnParticle(x+w*0.2+Math.random()*w*0.3, ty-8, 'smoke');
  }
}

// ── MINE ZONE ──────────────────────────────────
function drawMineZone(ctx,x,y,w,h,count,t){
  // dark cavern
  ctx.fillStyle='#0a0f0c';ctx.fillRect(x,y+22,w,h-22);

  // cave stalactites
  for(let i=0;i<6;i++){
    const sx=x+w*(0.1+i*0.15);
    ctx.fillStyle='#1a2820';
    ctx.beginPath();ctx.moveTo(sx-8,y+22);ctx.lineTo(sx+8,y+22);ctx.lineTo(sx,y+22+Math.random()*0+20+i*3);ctx.fill();
  }

  // mine cart track
  const ry=y+h*0.7;
  ctx.strokeStyle='#4a3a28';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x,ry);ctx.lineTo(x+w,ry);ctx.stroke();
  for(let i=0;i<8;i++){
    const tx=x+i*(w/7);
    ctx.beginPath();ctx.moveTo(tx,ry-4);ctx.lineTo(tx,ry+4);ctx.stroke();
  }

  // mine cart animated
  const cartX=x+((t*0.5)%(w+60))-30;
  ctx.fillStyle='#5a4a30';
  ctx.fillRect(cartX,ry-22,28,18);
  ctx.fillStyle='#8a2010';ctx.fillRect(cartX+2,ry-20,24,14);
  ctx.fillStyle='#3a3020';
  ctx.beginPath();ctx.arc(cartX+6,ry,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cartX+22,ry,5,0,Math.PI*2);ctx.fill();

  // miners
  const n=Math.min(count,6);
  for(let i=0;i<n;i++){
    const mx=x+w*(0.1+i*(0.8/Math.max(n-1,1)));
    const my=y+h*0.58;
    // body
    ctx.fillStyle='#4a3820';ctx.fillRect(mx-6,my,12,18);
    // head w helmet
    ctx.fillStyle='#c8a878';ctx.beginPath();ctx.arc(mx,my-6,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c8a020';ctx.fillRect(mx-8,my-12,16,6);
    ctx.fillStyle='#f0bc30';ctx.fillRect(mx-4,my-14,8,3);
    // pickaxe swing
    const swing=Math.sin(t*0.12+i*1.2);
    ctx.save();ctx.translate(mx+8,my+4);ctx.rotate(swing*0.8);
    ctx.strokeStyle='#8a8070';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(12,6);ctx.stroke();
    ctx.fillStyle='#9a8878';ctx.beginPath();ctx.moveTo(12,4);ctx.lineTo(18,0);ctx.lineTo(14,10);ctx.fill();
    ctx.restore();
    // sparks on swing
    if(Math.abs(swing)>0.6&&Math.random()<0.1){spawnParticle(mx+16,my+10,'spark');}
  }

  // ore veins
  ctx.fillStyle='rgba(200,100,30,0.3)';
  for(let i=0;i<4;i++){
    ctx.beginPath();ctx.arc(x+w*(0.2+i*0.2),y+h*0.45,4+i,0,Math.PI*2);ctx.fill();
  }
}

// ── FACTORY ZONE ───────────────────────────────
function drawFactoryZone(ctx,x,y,w,h,count,t){
  // chimneys
  const nCh=Math.min(count,5);
  for(let i=0;i<nCh;i++){
    const cx=x+w*(0.12+i*(0.7/Math.max(nCh-1,1)));
    ctx.fillStyle='#3a3028';ctx.fillRect(cx-6,y+26,12,h*0.45);
    ctx.fillStyle='#504030';ctx.fillRect(cx-8,y+24,16,8);
    // smoke puffs
    if(Math.random()<0.06){spawnParticle(cx,y+28,'smoke');}
    const puff1=Math.sin(t*0.04+i)*5;
    ctx.fillStyle=`rgba(120,110,90,${0.4-i*0.05})`;
    ctx.beginPath();ctx.arc(cx+puff1,y+20,6+Math.sin(t*0.05+i)*2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-puff1,y+12,4,0,Math.PI*2);ctx.fill();
  }
  // factory building
  ctx.fillStyle='#2a2418';
  ctx.fillRect(x+w*0.05,y+h*0.35,w*0.9,h*0.55);
  ctx.fillStyle='#383020';
  ctx.fillRect(x+w*0.05,y+h*0.35,w*0.9,10);

  // windows
  for(let i=0;i<4;i++){
    const winX=x+w*(0.12+i*0.22);
    const lit=Math.sin(t*0.05+i*2)>0;
    ctx.fillStyle=lit?'rgba(255,200,80,0.8)':'rgba(60,80,100,0.6)';
    ctx.fillRect(winX,y+h*0.42,w*0.12,h*0.12);
    ctx.strokeStyle='#504030';ctx.lineWidth=1;ctx.strokeRect(winX,y+h*0.42,w*0.12,h*0.12);
  }

  // conveyor belt
  const belt=y+h*0.72;
  ctx.fillStyle='#383028';ctx.fillRect(x+w*0.05,belt,w*0.9,10);
  const segW=20,offset=(t*1.2)%segW;
  ctx.fillStyle='#504038';
  for(let i=-1;i<w/segW+1;i++){
    ctx.fillRect(x+w*0.05+i*segW+offset,belt+1,segW/2,8);
  }
  // cans on belt
  for(let i=0;i<5;i++){
    const canX=x+w*0.08+((i*60+t*0.8)%(w*0.85));
    ctx.fillStyle='#c8391a';ctx.fillRect(canX,belt-8,12,10);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(canX,belt-8,4,10);
  }
}

// ── FARM ZONE ──────────────────────────────────
function drawFarmZone(ctx,x,y,w,h,count,t){
  // sky
  ctx.fillStyle='#0e1a08';ctx.fillRect(x,y+22,w,h*0.45);
  // ground
  ctx.fillStyle='#1a2a0c';ctx.fillRect(x,y+h*0.55,w,h*0.45);
  // grass
  ctx.fillStyle='#203a10';ctx.fillRect(x,y+h*0.55,w,6);

  // barn
  ctx.fillStyle='#6a1a10';ctx.fillRect(x+w*0.62,y+h*0.35,w*0.3,h*0.3);
  ctx.fillStyle='#8a2010';
  ctx.beginPath();ctx.moveTo(x+w*0.60,y+h*0.35);ctx.lineTo(x+w*0.77,y+h*0.22);ctx.lineTo(x+w*0.94,y+h*0.35);ctx.fill();
  ctx.fillStyle='#3a1808';ctx.fillRect(x+w*0.70,y+h*0.5,w*0.1,h*0.15);

  // fence
  ctx.strokeStyle='#6a5020';ctx.lineWidth=2;
  for(let i=0;i<8;i++){
    const fx=x+w*(0.05+i*0.1);
    ctx.beginPath();ctx.moveTo(fx,y+h*0.55);ctx.lineTo(fx,y+h*0.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,y+h*0.62);ctx.lineTo(fx+w*0.1,y+h*0.62);ctx.stroke();
  }

  // pigs
  const n=Math.min(count,8);
  for(let i=0;i<n;i++){
    const px=x+w*(0.06+i*(0.5/Math.max(n-1,1)));
    const py=y+h*0.62+Math.sin(t*0.06+i*1.3)*3;
    // body
    ctx.fillStyle='#e8a090';ctx.beginPath();ctx.ellipse(px,py,12,9,0,0,Math.PI*2);ctx.fill();
    // head
    ctx.fillStyle='#e8a090';ctx.beginPath();ctx.arc(px+12,py-3,8,0,Math.PI*2);ctx.fill();
    // snout
    ctx.fillStyle='#c8706a';ctx.beginPath();ctx.ellipse(px+18,py-2,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a05050';ctx.beginPath();ctx.arc(px+16,py-1,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(px+20,py-1,1.5,0,Math.PI*2);ctx.fill();
    // ear
    ctx.fillStyle='#d08080';
    ctx.beginPath();ctx.moveTo(px+9,py-10);ctx.lineTo(px+13,py-16);ctx.lineTo(px+17,py-10);ctx.fill();
    // tail
    ctx.strokeStyle='#e8a090';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px-10,py);ctx.quadraticCurveTo(px-16,py-8,px-14,py-12);ctx.stroke();
    // trotting legs
    const legAnim=Math.sin(t*0.1+i);
    ctx.strokeStyle='#c88070';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(px-5,py+7);ctx.lineTo(px-5+legAnim*3,py+16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+5,py+7);ctx.lineTo(px+5-legAnim*3,py+16);ctx.stroke();
  }
}

// ── LAB ZONE ───────────────────────────────────
function drawLabZone(ctx,x,y,w,h,count,t){
  // lab tiles floor
  for(let i=0;i<6;i++) for(let j=0;j<3;j++){
    ctx.fillStyle=(i+j)%2===0?'#0e1622':'#0a1018';
    ctx.fillRect(x+i*(w/6),y+h*0.7+j*12,w/6,12);
  }

  // equipment tables
  ctx.fillStyle='#182030';ctx.fillRect(x+w*0.05,y+h*0.55,w*0.4,10);
  ctx.fillStyle='#182030';ctx.fillRect(x+w*0.55,y+h*0.55,w*0.4,10);

  // flasks and bubbling liquids
  const colors=['#2a8a4a','#c8391a','#2a5aaa','#aaaa20','#8a2a8a'];
  const n=Math.min(count,8);
  for(let i=0;i<n;i++){
    const fx=x+w*(0.1+i*(0.8/Math.max(n-1,1)));
    const fy=y+h*0.38;
    const col=colors[i%colors.length];
    const liquid=0.5+0.3*Math.sin(t*0.08+i);
    // flask shape
    ctx.strokeStyle='rgba(100,150,200,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(fx-4,fy);ctx.lineTo(fx-8,fy+22);ctx.lineTo(fx+8,fy+22);ctx.lineTo(fx+4,fy);ctx.stroke();
    ctx.strokeRect(fx-3,fy-8,6,10);
    // liquid
    ctx.fillStyle=col+'99';
    ctx.beginPath();ctx.moveTo(fx-7,fy+22-liquid*15);ctx.lineTo(fx-8,fy+22);ctx.lineTo(fx+8,fy+22);ctx.lineTo(fx+7,fy+22-liquid*15);ctx.fill();
    // bubble
    if(Math.random()<0.03){spawnParticle(fx,fy+18,'bubble');}
    // glow
    ctx.fillStyle=col+'22';
    ctx.beginPath();ctx.arc(fx,fy+14,10,0,Math.PI*2);ctx.fill();
  }

  // scientist
  const sciX=x+w*0.5, sciY=y+h*0.56;
  ctx.fillStyle='#e0e8f0';ctx.beginPath();ctx.ellipse(sciX,sciY,8,16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c8b890';ctx.beginPath();ctx.arc(sciX,sciY-18,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c0c8d8';ctx.beginPath();ctx.arc(sciX,sciY-18,7,Math.PI,Math.PI*2);ctx.fill();
  // goggles
  ctx.strokeStyle='#80a0c0';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(sciX-4,sciY-18,3,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(sciX+4,sciY-18,3,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sciX-1,sciY-18);ctx.lineTo(sciX+1,sciY-18);ctx.stroke();
  // arm with flask
  const armA=Math.sin(t*0.07)*0.5;
  ctx.save();ctx.translate(sciX+8,sciY-8);ctx.rotate(armA);
  ctx.strokeStyle='#e0e8f0';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(10,12);ctx.stroke();
  ctx.fillStyle='#2a8a4a99';ctx.fillRect(8,10,6,10);
  ctx.restore();
}

// ── SHIP ZONE ──────────────────────────────────
function drawShipZone(ctx,x,y,w,h,count,t){
  // water
  const waterY=y+h*0.6;
  ctx.fillStyle='#0a1828';ctx.fillRect(x,waterY,w,h*0.4);
  // waves
  ctx.strokeStyle='rgba(40,80,160,0.5)';ctx.lineWidth=2;
  for(let wave=0;wave<3;wave++){
    ctx.beginPath();
    for(let wx=0;wx<w;wx+=4){
      const wy=waterY+wave*12+Math.sin((wx+t*1.5+wave*30)*0.05)*4;
      wx===0?ctx.moveTo(x+wx,wy):ctx.lineTo(x+wx,wy);
    }ctx.stroke();
  }
  // sky/dock
  ctx.fillStyle='#0a1020';ctx.fillRect(x,y+22,w,waterY-y-22);
  // dock planks
  ctx.fillStyle='#4a3820';ctx.fillRect(x,waterY-12,w,14);
  for(let i=0;i<12;i++){ctx.fillStyle='#3a2818';ctx.fillRect(x+i*(w/11),waterY-12,2,14);}

  // ships
  const n=Math.min(count,4);
  for(let i=0;i<n;i++){
    const sx=x+w*(0.1+i*(0.7/Math.max(n-1,1)));
    const bob=Math.sin(t*0.04+i)*3;
    const sy=waterY-20+bob;
    // hull
    ctx.fillStyle='#3a4858';
    ctx.beginPath();ctx.moveTo(sx-22,sy);ctx.lineTo(sx+22,sy);ctx.lineTo(sx+18,sy+18);ctx.lineTo(sx-18,sy+18);ctx.fill();
    ctx.fillStyle='#c8391a';ctx.fillRect(sx-18,sy+12,36,4);
    // cabin
    ctx.fillStyle='#4a5868';ctx.fillRect(sx-10,sy-18,20,18);
    // porthole
    ctx.strokeStyle='#8aaac0';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(sx,sy-9,4,0,Math.PI*2);ctx.stroke();
    const lit=Math.sin(t*0.1+i)>0;
    ctx.fillStyle=lit?'rgba(255,200,80,0.5)':'rgba(20,40,60,0.8)';
    ctx.beginPath();ctx.arc(sx,sy-9,3,0,Math.PI*2);ctx.fill();
    // mast
    ctx.strokeStyle='#6a5a40';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx+6,sy-18);ctx.lineTo(sx+6,sy-50);ctx.stroke();
    // flag
    ctx.fillStyle='#c8391a';
    ctx.beginPath();ctx.moveTo(sx+6,sy-50);ctx.lineTo(sx+20,sy-44);ctx.lineTo(sx+6,sy-38);ctx.fill();
    ctx.fillStyle='white';ctx.font='7px sans-serif';ctx.textAlign='center';
    ctx.fillText('S',sx+13,sy-43);
    // wake
    ctx.strokeStyle='rgba(60,100,160,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx-22,sy+14);ctx.quadraticCurveTo(sx-35,sy+20,sx-50,sy+16);ctx.stroke();
  }
}

// ── SILO ZONE ──────────────────────────────────
function drawSiloZone(ctx,x,y,w,h,count,t){
  ctx.fillStyle='#141208';ctx.fillRect(x,y+22,w,h-22);
  const n=Math.min(count,6);
  for(let i=0;i<n;i++){
    const sx=x+w*(0.1+i*(0.8/Math.max(n-1,1)));
    const sh=h*(0.3+0.2*(i%2));
    const sy=y+h*0.72-sh;
    // silo body
    const grad=ctx.createLinearGradient(sx-15,0,sx+15,0);
    grad.addColorStop(0,'#4a4030');grad.addColorStop(0.4,'#706050');grad.addColorStop(1,'#3a3028');
    ctx.fillStyle=grad;ctx.fillRect(sx-15,sy,30,sh);
    // dome top
    ctx.fillStyle='#604a30';
    ctx.beginPath();ctx.ellipse(sx,sy,15,8,0,0,Math.PI,true);ctx.fill();
    // bands
    for(let b=0;b<4;b++){
      ctx.strokeStyle='rgba(100,80,50,0.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx-15,sy+sh*(0.2+b*0.2));ctx.lineTo(sx+15,sy+sh*(0.2+b*0.2));ctx.stroke();
    }
    // level indicator - pulsing
    const lvl=0.3+0.5*((Math.sin(t*0.01+i)+1)/2);
    ctx.fillStyle='rgba(200,57,26,0.5)';
    ctx.fillRect(sx-13,sy+sh*(1-lvl),26,sh*lvl);
    // vent on top
    ctx.fillStyle='#808070';ctx.fillRect(sx-3,sy-12,6,6);
    if(Math.random()<0.03){spawnParticle(sx,sy-10,'smoke');}
  }
  // ground pipe system
  ctx.strokeStyle='#504030';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(x+w*0.05,y+h*0.75);ctx.lineTo(x+w*0.95,y+h*0.75);ctx.stroke();
  ctx.strokeStyle='#606040';ctx.lineWidth=3;
  for(let i=0;i<n;i++){
    const sx=x+w*(0.1+i*(0.8/Math.max(n-1,1)));
    ctx.beginPath();ctx.moveTo(sx,y+h*0.72);ctx.lineTo(sx,y+h*0.75);ctx.stroke();
  }
}

// ── STATION ZONE ───────────────────────────────
function drawStationZone(ctx,x,y,w,h,count,t){
  // space bg - stars
  for(let i=0;i<30;i++){
    const sx=x+(i*73%w);const sy=y+22+(i*41%(h-22));
    const brightness=0.3+0.5*Math.sin(t*0.05+i);
    ctx.fillStyle=`rgba(255,255,255,${brightness})`;
    ctx.fillRect(sx,sy,1,1);
  }
  // planet
  const pr=Math.min(w,h)*0.12;
  ctx.fillStyle='#1a3050';
  ctx.beginPath();ctx.arc(x+w*0.2,y+h*0.75,pr,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(40,100,180,0.4)';ctx.lineWidth=4;
  ctx.beginPath();ctx.ellipse(x+w*0.2,y+h*0.75,pr*1.8,pr*0.5,-0.3,0,Math.PI*2);ctx.stroke();

  // orbital station(s)
  const n=Math.min(count,4);
  for(let i=0;i<n;i++){
    const angle=t*0.01*(0.6+i*0.2)+i*(Math.PI*2/n);
    const rx=x+w*0.55, ry=y+h*0.5;
    const orbitR=Math.min(w,h)*(0.15+i*0.06);
    const sx=rx+Math.cos(angle)*orbitR*(w/h);
    const sy=ry+Math.sin(angle)*orbitR*0.5;
    // orbit path (faint)
    ctx.strokeStyle='rgba(60,100,200,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(rx,ry,orbitR*(w/h),orbitR*0.5,0,0,Math.PI*2);ctx.stroke();
    // station body
    ctx.fillStyle='#707880';ctx.fillRect(sx-10,sy-5,20,10);
    // solar panels
    ctx.fillStyle='#1a4080';ctx.fillRect(sx-28,sy-3,14,6);ctx.fillRect(sx+14,sy-3,14,6);
    ctx.strokeStyle='#2a6090';ctx.lineWidth=0.5;
    for(let p=0;p<3;p++){ctx.strokeRect(sx-28+p*5,sy-3,4,6);ctx.strokeRect(sx+14+p*5,sy-3,4,6);}
    // blinking light
    if(Math.sin(t*0.15+i)>0){
      ctx.fillStyle='#ff4040';ctx.beginPath();ctx.arc(sx,sy-5,2,0,Math.PI*2);ctx.fill();
    }
  }
}

// ── VOLCANO ZONE ───────────────────────────────
function drawVolcanoZone(ctx,x,y,w,h,count,t){
  // lava sky glow
  ctx.fillStyle='rgba(120,30,10,0.15)';ctx.fillRect(x,y+22,w,h-22);

  // volcano mountain
  const vx=x+w*0.5;
  ctx.fillStyle='#2a1808';
  ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(vx-w*0.3,y+h*0.4);ctx.lineTo(vx,y+h*0.28);ctx.lineTo(vx+w*0.3,y+h*0.4);ctx.lineTo(x+w,y+h);ctx.fill();

  // crater glow
  const glow=0.5+0.4*Math.sin(t*0.08);
  const cgrad=ctx.createRadialGradient(vx,y+h*0.3,0,vx,y+h*0.3,30);
  cgrad.addColorStop(0,`rgba(255,150,30,${glow})`);
  cgrad.addColorStop(0.5,`rgba(200,50,10,${glow*0.5})`);
  cgrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cgrad;ctx.beginPath();ctx.arc(vx,y+h*0.3,30,0,Math.PI*2);ctx.fill();

  // lava flow
  ctx.strokeStyle=`rgba(220,80,20,0.7)`;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(vx,y+h*0.34);
  ctx.quadraticCurveTo(vx+20,y+h*0.5,vx+10,y+h*0.7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(vx,y+h*0.34);
  ctx.quadraticCurveTo(vx-20,y+h*0.48,vx-8,y+h*0.65);ctx.stroke();

  // eruption particles
  if(Math.random()<0.08){
    spawnParticle(vx+(Math.random()-0.5)*10,y+h*0.3,'spark');
    spawnParticle(vx+(Math.random()-0.5)*10,y+h*0.3,'smoke');
  }

  // SPAM cans being cooked
  const n=Math.min(count,8);
  for(let i=0;i<n;i++){
    const cx=x+w*(0.1+i*(0.8/Math.max(n-1,1)));
    const cy=y+h*0.78+Math.sin(t*0.05+i)*2;
    ctx.fillStyle='#c8391a';ctx.fillRect(cx-6,cy-8,12,14);
    ctx.fillStyle='#8ba0a8';ctx.fillRect(cx-6,cy-10,12,4);
    // steam
    if(Math.random()<0.04){spawnParticle(cx,cy-10,'smoke');}
  }
}

// ── PORTAL ZONE ────────────────────────────────
function drawPortalZone(ctx,x,y,w,h,count,t){
  ctx.fillStyle='#0a0814';ctx.fillRect(x,y+22,w,h-22);
  // portal rings
  const n=Math.min(count,4);
  for(let i=0;i<n;i++){
    const px=x+w*(0.2+i*(0.55/Math.max(n-1,1)));
    const py=y+h*0.5;
    const pr=Math.min(w/(n+1),40)*0.8;
    const hue=(t*1.5+i*90)%360;
    for(let r=pr;r>4;r-=6){
      ctx.strokeStyle=`hsla(${hue},80%,60%,${0.15*(pr-r)/pr+0.05})`;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.ellipse(px,py,r,r*1.4,t*0.005+i,0,Math.PI*2);ctx.stroke();
    }
    // inner glow
    const ig=ctx.createRadialGradient(px,py,0,px,py,pr*0.6);
    ig.addColorStop(0,`hsla(${hue},80%,70%,0.4)`);
    ig.addColorStop(1,'transparent');
    ctx.fillStyle=ig;ctx.beginPath();ctx.ellipse(px,py,pr*0.6,pr*0.85,0,0,Math.PI*2);ctx.fill();
    // SPAM cans falling through
    const canY=y+h*0.2+((t*0.5+i*60)%(h*0.6));
    ctx.fillStyle='rgba(200,57,26,0.8)';
    ctx.save();ctx.translate(px,canY);ctx.rotate(t*0.05+i);
    ctx.fillRect(-5,-7,10,14);
    ctx.restore();
  }
  // floating debris
  for(let i=0;i<8;i++){
    const dx=x+((i*80+t*0.3)%w);
    const dy=y+h*0.3+Math.sin(t*0.04+i)*h*0.2;
    ctx.fillStyle=`rgba(100,60,180,${0.3+0.2*Math.sin(t*0.07+i)})`;
    ctx.beginPath();ctx.arc(dx,dy,2+i%3,0,Math.PI*2);ctx.fill();
  }
}

// ── HIVE ZONE ──────────────────────────────────
function drawHiveZone(ctx,x,y,w,h,count,t){
  ctx.fillStyle='#0a1008';ctx.fillRect(x,y+22,w,h-22);
  // hexagonal hive pattern
  const hexR=12;
  for(let hx=0;hx<w/hexR/1.5+2;hx++){
    for(let hy=0;hy<h/hexR/1.7+2;hy++){
      const cx2=x+hx*hexR*1.5;
      const cy2=y+22+hy*hexR*1.73+(hx%2)*hexR*0.87;
      const glow=Math.sin(t*0.05+hx*0.3+hy*0.5)>0.5;
      ctx.strokeStyle=glow?'rgba(200,180,20,0.25)':'rgba(60,80,20,0.12)';
      ctx.lineWidth=1;
      ctx.beginPath();
      for(let k=0;k<6;k++){
        const ang=k*Math.PI/3;
        k===0?ctx.moveTo(cx2+hexR*Math.cos(ang),cy2+hexR*Math.sin(ang)):ctx.lineTo(cx2+hexR*Math.cos(ang),cy2+hexR*Math.sin(ang));
      }
      ctx.closePath();ctx.stroke();
      if(glow){ctx.fillStyle='rgba(180,160,10,0.06)';ctx.fill();}
    }
  }
  // nano bots
  const n=Math.min(count,20);
  for(let i=0;i<n;i++){
    const bx=x+w*0.1+Math.sin(t*0.04+i*2.1)*(w*0.35)+Math.cos(t*0.03+i*1.7)*(w*0.15);
    const by=y+h*0.35+Math.cos(t*0.05+i*1.9)*(h*0.25)+Math.sin(t*0.04+i*2.3)*(h*0.1);
    ctx.fillStyle=`rgba(160,200,80,${0.6+0.3*Math.sin(t*0.1+i)})`;
    ctx.beginPath();ctx.arc(bx,by,2.5,0,Math.PI*2);ctx.fill();
    // trail
    ctx.strokeStyle='rgba(100,180,40,0.2)';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(bx,by);
    ctx.lineTo(bx-Math.sin(t*0.04+i*2.1)*8,by-Math.cos(t*0.05+i*1.9)*8);
    ctx.stroke();
  }
}

// ── STAR FORGE ZONE ────────────────────────────
function drawStarZone(ctx,x,y,w,h,count,t){
  ctx.fillStyle='#080608';ctx.fillRect(x,y+22,w,h-22);
  // star field
  for(let i=0;i<40;i++){
    const sx=x+((i*137+t*0.2*(i%3))%w);
    const sy=y+22+(i*89%(h-22));
    const sz=0.3+0.6*Math.sin(t*0.1+i);
    ctx.fillStyle=`rgba(255,255,255,${sz})`;
    ctx.fillRect(sx,sy,1,1);
  }
  // star forge (giant star)
  const n=Math.min(count,3);
  for(let i=0;i<n;i++){
    const sfx=x+w*(0.25+i*(0.45/Math.max(n-1,1)));
    const sfy=y+h*0.5;
    const sr=Math.min(w/(n+1),h*0.25)*0.6;
    const hue=(t*0.5+i*120)%360;
    // corona
    for(let r=sr*2.5;r>sr;r-=5){
      ctx.fillStyle=`hsla(${30+hue*0.1},90%,70%,${0.05*(sr*2.5-r)/(sr*1.5)})`;
      ctx.beginPath();ctx.arc(sfx,sfy,r,0,Math.PI*2);ctx.fill();
    }
    // star body
    const sg=ctx.createRadialGradient(sfx,sfy,0,sfx,sfy,sr);
    sg.addColorStop(0,'#ffffff');
    sg.addColorStop(0.3,'#fff080');
    sg.addColorStop(0.7,'#ff8020');
    sg.addColorStop(1,'rgba(200,40,10,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sfx,sfy,sr,0,Math.PI*2);ctx.fill();
    // solar flares
    for(let f=0;f<6;f++){
      const fang=t*0.02+f*Math.PI/3;
      const fl=sr*(0.8+0.4*Math.sin(t*0.07+f));
      ctx.strokeStyle=`rgba(255,180,40,0.4)`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sfx+Math.cos(fang)*sr,sfy+Math.sin(fang)*sr);
      ctx.lineTo(sfx+Math.cos(fang)*(sr+fl),sfy+Math.sin(fang)*(sr+fl));
      ctx.stroke();
    }
    // SPAM cans orbiting
    const canAngle=t*0.015*(1+i*0.3)+i*2;
    const ocx=sfx+Math.cos(canAngle)*(sr+35);
    const ocy=sfy+Math.sin(canAngle)*(sr+35)*0.5;
    ctx.save();ctx.translate(ocx,ocy);ctx.rotate(canAngle);
    ctx.fillStyle='#c8391a';ctx.fillRect(-5,-7,10,14);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-5,-7,4,14);
    ctx.restore();
    // sparks
    if(Math.random()<0.08){spawnParticle(sfx+(Math.random()-0.5)*sr*2,sfy+(Math.random()-0.5)*sr*2,'spark');}
  }
}

// ─── RENDER PANELS ────────────────────────────────────────────────
function renderUnits(){
  const c=document.getElementById('unitsList');c.innerHTML='';
  UNITS.forEach(unit=>{
    const cost=unitCost(unit);
    const locked=G.cans<cost&&G.units[unit.id]===0&&G.total<cost*0.3;
    const afford=G.cans>=cost;
    const d=document.createElement('div');
    d.className=`ucard${locked?' locked':''}${afford?' afford':''}`;
    d.innerHTML=`<div class="uicon">${unit.icon}</div><div class="uinfo"><div class="uname">${unit.name}</div><div class="ucost">🥫 ${fmt(cost)}</div><div class="udps">${(unit.baseCps*G.um[unit.id]).toFixed(2)}/s each</div></div><div class="ucount">${G.units[unit.id]}</div>`;
    if(!locked)d.onclick=()=>buyUnit(unit);
    c.appendChild(d);
  });
}

function renderUpgrades(){
  const c=document.getElementById('upgradesList');c.innerHTML='';
  UPGRADES.forEach(upg=>{
    const bought=G.bought.has(upg.id);
    const unlocked=G.total>=upg.cost*0.25||bought;
    const afford=G.cans>=upg.cost;
    const d=document.createElement('div');
    d.className=`upcard${!unlocked?' locked':''}${bought?' bought':''}${afford&&!bought?' afford':''}`;
    d.innerHTML=`<div class="upicon">${upg.icon}</div><div class="upinfo"><div class="upname">${upg.name}</div><div class="upcost">${bought?'✓ INSTALLED':'🥫 '+fmt(upg.cost)}</div><div class="updesc">${upg.desc}</div></div>`;
    if(!bought&&unlocked)d.onclick=()=>buyUpgrade(upg);
    c.appendChild(d);
  });
}

function renderStats(){
  const totalBuildings=UNITS.reduce((s,u)=>s+G.units[u.id],0);
  document.getElementById('statTotal').textContent=fmt(G.total);
  document.getElementById('statCps').textContent=G.cps.toFixed(2)+'/s';
  document.getElementById('statCpc').textContent=fmt(G.cm);
  document.getElementById('statBuildings').textContent=totalBuildings;
  document.getElementById('statUpg').textContent=G.upgCount;
  document.getElementById('hdrCount').textContent=fmt(G.cans)+' 🥫';
  document.getElementById('hdrCps').textContent=G.cps.toFixed(2)+'/sec';
  document.getElementById('canCount').textContent=fmt(G.cans)+' 🥫';
  document.getElementById('canCps').textContent=G.cps.toFixed(2)+' cans/sec · click to produce';

  let mi=G.nextM;
  while(mi<MILESTONES.length&&G.total>=MILESTONES[mi]){
    addLog(`🎉 MILESTONE: ${fmt(MILESTONES[mi])} cans!`);mi++;
  }
  G.nextM=mi;
  const nextM=MILESTONES[mi]||MILESTONES[MILESTONES.length-1]*10;
  const prevM=mi>0?MILESTONES[mi-1]:0;
  document.getElementById('mbar').style.width=(Math.min(1,(G.total-prevM)/(nextM-prevM))*100)+'%';
  document.getElementById('mlabel').textContent=`Next: ${fmt(nextM)} cans`;
}

function renderAll(){renderUnits();renderUpgrades();renderStats();}

// CLICK
document.getElementById('mainBtn').addEventListener('click',e=>{
  const gain=G.cm;G.cans+=gain;G.total+=gain;
  const row=document.getElementById('canRow');
  const p=document.createElement('div');
  p.className='click-part';
  p.textContent='+'+fmt(gain)+' 🥫';
  p.style.cssText=`left:${e.offsetX}px;top:${e.offsetY}px;`;
  row.style.position='relative';
  row.appendChild(p);
  setTimeout(()=>p.remove(),700);
  renderStats();
});

// GAME LOOP
let last=performance.now();
function gameLoop(now){
  const dt=(now-last)/1000;last=now;tick=now/1000;
  G.cans+=G.cps*dt;G.total+=G.cps*dt;
  renderStats();
  drawWorld();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('resize',()=>{resize();});
resize();
renderAll();
requestAnimationFrame(gameLoop);
setInterval(renderAll,1200);
</script>
